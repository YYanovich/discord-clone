services:
  postgres:                          
    image: postgres:16-alpine        

    environment:
      POSTGRES_DB: discord          
      POSTGRES_USER: discord         
      POSTGRES_PASSWORD: secret     
    ports:
      - "5433:5432"                  
                                  
    volumes:
      - pg_data:/var/lib/postgresql/data 

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discord"] 
      interval: 5s                  
      retries: 5                     

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]  

volumes:
  pg_data:                         
